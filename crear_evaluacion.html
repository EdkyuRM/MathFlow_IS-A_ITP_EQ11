<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Métrica de Evaluación - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0; padding: 0;
      background-image: url('imagenes/recursos/fondo_general.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .main-wrapper {
      width: 90%; max-width: 1100px;
      background: rgba(255, 255, 255, 0.99);
      min-height: 100vh; padding: 60px;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
      box-sizing: border-box;
    }
    .header-section {
      border-bottom: 3px solid #7CFC00;
      padding-bottom: 30px; margin-bottom: 40px;
    }
    .form-container {
      background: #ffffff; border: 1px solid #eee;
      padding: 40px; border-radius: 4px;
    }
    .input-label {
      font-size: 0.85em; font-weight: bold; color: #444;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px; display: block;
    }
    input, select {
      width: 100%; padding: 18px;
      margin-bottom: 25px; border: 1px solid #ddd;
      background: #f9f9f9; border-radius: 4px;
      font-size: 1em; box-sizing: border-box;
    }
    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      background: #fafafa; padding: 25px; border: 1px dashed #ccc;
      margin-bottom: 25px;
    }
    .btn-submit {
      width: 100%; padding: 22px;
      background: #1a1a1a; color: #7CFC00;
      border: none; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer; border-radius: 4px;
      transition: 0.3s;
    }
    .btn-submit:hover { background: #333; transform: translateY(-2px); }
  </style>
</head>
<body>

<div class="main-wrapper">
  <div class="header-section">
    <h1 style="font-size: 2.8em; margin: 0; color: #1a1a1a; text-transform: uppercase;">Diseño de Evaluación</h1>
    <div style="color: #888; font-weight: bold; letter-spacing: 1px; margin-top: 5px;">DEFINICIÓN DE REACTIVOS Y OPCIONES DE RESPUESTA</div>
  </div>

  <div class="form-container">
    <span class="input-label">Planteamiento de la Pregunta</span>
    <input type="text" id="pregunta" placeholder="ESCRIBA EL PROBLEMA O PREGUNTA AQUÍ">

    <span class="input-label">Opciones Disponibles</span>
    <div class="options-grid">
      <div>
        <span class="input-label" style="font-size: 0.7em;">Opción A</span>
        <input type="text" id="optA" placeholder="VALOR A" style="margin-bottom: 0;">
      </div>
      <div>
        <span class="input-label" style="font-size: 0.7em;">Opción B</span>
        <input type="text" id="optB" placeholder="VALOR B" style="margin-bottom: 0;">
      </div>
      <div>
        <span class="input-label" style="font-size: 0.7em;">Opción C</span>
        <input type="text" id="optC" placeholder="VALOR C" style="margin-bottom: 0;">
      </div>
      <div>
        <span class="input-label" style="font-size: 0.7em;">Opción D</span>
        <input type="text" id="optD" placeholder="VALOR D" style="margin-bottom: 0;">
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
      <div>
        <span class="input-label">Respuesta Correcta</span>
        <select id="select_correcta">
          <option value="">INDICAR INCISO CORRECTO</option>
          <option value="A">INCISO A</option>
          <option value="B">INCISO B</option>
          <option value="C">INCISO C</option>
          <option value="D">INCISO D</option>
        </select>
      </div>
      <div>
        <span class="input-label">Puntaje</span>
        <input type="number" id="puntaje" value="100">
      </div>
    </div>

    <button class="btn-submit" onclick="finalizarEvaluacion()">PUBLICAR EVALUACIÓN AL CURSO</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'http://127.0.0.1:54321';
  const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH'; 
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function finalizarEvaluacion() {
    const idLeccion = sessionStorage.getItem("leccionRecienCreada");
    const pregunta = document.getElementById('pregunta').value;
    const inciso = document.getElementById('select_correcta').value;
    const pts = document.getElementById('puntaje').value;

    // Valores de las opciones
    const a = document.getElementById('optA').value;
    const b = document.getElementById('optB').value;
    const c = document.getElementById('optC').value;
    const d = document.getElementById('optD').value;

    if(!pregunta || !inciso || !a || !b || !c || !d) {
      return alert("TODOS LOS CAMPOS DE LA EVALUACIÓN SON OBLIGATORIOS.");
    }

    // Obtenemos el texto de la respuesta que el docente marcó como correcta
    const textoRespuesta = document.getElementById('opt' + inciso).value;

    try {
      const { error } = await _supabase.from('evaluacion').insert({
        id_leccion: parseInt(idLeccion),
        pregunta: pregunta,
        opcion_a: a,
        opcion_b: b,
        opcion_c: c,
        opcion_d: d,
        respuesta_correcta: textoRespuesta,
        puntaje: parseInt(pts)
      });

      if (error) throw error;

      alert("CONTENIDO PUBLICADO EXITOSAMENTE.");
      sessionStorage.removeItem("leccionRecienCreada");
      window.location.href = 'gestion_detallada.html';

    } catch (err) {
      console.error("ERROR DE INSERCIÓN:", err);
      alert("FALLO EN EL REGISTRO: " + err.message);
    }
  }
</script>
</body>
</html>
