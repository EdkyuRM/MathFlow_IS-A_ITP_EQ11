<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Analítica de Estudiante - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0; padding: 0;
      background-image: url('imagenes/recursos/fondo_general.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .analytics-wrapper {
      width: 94%; max-width: 1400px;
      background: rgba(255, 255, 255, 0.99);
      min-height: 100vh; padding: 60px;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
      box-sizing: border-box;
    }
    .data-table {
      width: 100%; border-collapse: collapse; margin-top: 30px;
    }
    th {
      text-align: left; padding: 15px; background: #1a1a1a;
      color: #7CFC00; text-transform: uppercase; font-size: 0.8em;
    }
    td { padding: 15px; border-bottom: 1px solid #eee; }
    .recommendation-box {
      border: 1px dashed #7CFC00; padding: 25px;
      background: #f0fff0; margin-top: 40px;
    }
  </style>
</head>
<body>

<div class="analytics-wrapper">
  <button onclick="window.history.back()" style="padding: 10px 20px; background: #eee; border: none; font-weight: bold; cursor: pointer;">← VOLVER</button>
  
  <h1 id="nombre-alumno" style="font-size: 3em; text-transform: uppercase; margin: 30px 0 10px 0;">CONSULTANDO ALUMNO...</h1>
  <div style="font-weight: bold; color: #666; letter-spacing: 2px;">EXPEDIENTE DE DESEMPEÑO ACADÉMICO</div>

  <table class="data-table">
    <thead>
      <tr>
        <th>FECHA DE EVALUACIÓN</th>
        <th>LECCIÓN / UNIDAD</th>
        <th>CALIFICACIÓN</th>
      </tr>
    </thead>
    <tbody id="historial-tabla"></tbody>
  </table>

  <div class="recommendation-box">
    <h3 style="margin-top: 0; text-transform: uppercase; letter-spacing: 1px;">Sugerencias del Algoritmo</h3>
    <div id="lista-recomendaciones" style="font-size: 0.9em; color: #444;">
      EL SISTEMA NO HA GENERADO ALERTAS PARA ESTE ESTUDIANTE.
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'http://127.0.0.1:54321';
  const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.addEventListener('DOMContentLoaded', async () => {
    const uid = sessionStorage.getItem("alumnoAMonitorear");
    
    const { data: usuario } = await _supabase.from('usuario').select('nombre').eq('id_usuario', uid).single();
    if (usuario) document.getElementById('nombre-alumno').innerText = usuario.nombre.toUpperCase();

    const { data: progresos } = await _supabase
      .from('progreso_alumno')
      .select('puntaje_obtenido, fecha_evaluacion, leccion(tema)')
      .eq('id_usuario', uid)
      .order('fecha_evaluacion', { ascending: false });

    const tbody = document.getElementById('historial-tabla');
    if (progresos) {
      progresos.forEach(p => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${new Date(p.fecha_evaluacion).toLocaleDateString()}</td>
          <td style="font-weight: bold;">${p.leccion.tema.toUpperCase()}</td>
          <td style="color: ${p.puntaje_obtenido < 70 ? 'red' : 'green'}; font-weight: bold;">${p.puntaje_obtenido}%</td>
        `;
        tbody.appendChild(row);
      });
    }
  });
</script>
</body>
</html>
