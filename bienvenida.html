<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Estudiante - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0; padding: 0;
      background-image: url('imagenes/recursos/fondo_general.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .dashboard-wrapper {
      width: 95%; max-width: 1500px;
      background: rgba(255, 255, 255, 0.98);
      min-height: 100vh; padding: 60px;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
      box-sizing: border-box;
    }
    .dashboard-header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 3px solid #7CFC00;
      padding-bottom: 30px; margin-bottom: 50px;
    }
    .user-actions {
      display: flex; gap: 15px;
    }
    .section-container {
      display: grid; grid-template-columns: 1fr; gap: 40px;
    }
    .content-box {
      background: #fff; border: 1px solid #ddd;
      padding: 40px; border-radius: 4px;
      min-height: 300px;
      display: flex; flex-direction: column;
    }
    .btn-action {
      background: #1a1a1a; color: #7CFC00;
      border: none; padding: 12px 25px;
      font-weight: bold; text-transform: uppercase;
      letter-spacing: 1px; cursor: pointer;
      border-radius: 4px; transition: 0.3s;
    }
    .btn-action:hover { background: #333; }
    
    .materias-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px; margin-top: 20px;
    }
    .materia-card {
      border: 1px solid #eee; padding: 25px;
      background: #fcfcfc; cursor: pointer;
      display: flex; align-items: center; gap: 20px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .materia-card:hover {
      transform: translateY(-5px);
      border-color: #7CFC00;
    }
    .materia-card img {
      width: 70px; height: 70px; border-radius: 4px; object-fit: cover;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>

<div class="dashboard-wrapper">
  <header class="dashboard-header">
    <div style="text-align: left;">
      <h1 id="saludo" style="font-size: 3.2em; margin: 0; color: #1a1a1a; text-transform: uppercase;">SINCRONIZANDO SISTEMA...</h1>
      <div style="color: #666; letter-spacing: 2px; font-weight: bold; font-size: 0.9em;">CENTRO DE GESTIÓN ACADÉMICA</div>
    </div>
    <div class="user-actions">
      <button onclick="window.location.href='perfil.html'" class="btn-action" style="background: #eee; color: #333;">MI PERFIL</button>
      <button onclick="cerrarSesion()" class="btn-action" style="background: #ff4d4d; color: white;">SALIR</button>
    </div>
  </header>

  <div class="section-container">
    
    <div class="content-box">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
        <h2 style="text-transform: uppercase; font-size: 1.2em; letter-spacing: 2px; color: #1a1a1a; margin: 0;">
          MIS ASIGNATURAS
        </h2>
        <button onclick="mostrarPromptInscripcion()" class="btn-action" style="font-size: 0.8em; padding: 8px 20px;">
          + INSCRIBIRSE A CURSO
        </button>
      </div>

      <div id="contenedor-materias">
        <p style="color: #999; text-align: center; padding: 40px;">BUSCANDO REGISTROS EN LA BASE DE DATOS...</p>
      </div>
    </div>

    <div id="seccion-algoritmo" class="content-box" style="border-top: 5px solid #7CFC00;">
      <h2 style="text-transform: uppercase; font-size: 1.2em; letter-spacing: 2px; color: #1a1a1a; margin-bottom: 25px;">
        SUGERENCIAS DE REFUERZO IA
      </h2>
      <div id="contenedor-recomendaciones">
        <div style="text-align: center; padding: 50px; color: #999; background: #fafafa; border: 1px dashed #ddd;">
          EL ALGORITMO NO HA DETECTADO NECESIDADES DE REFUERZO ACTUALMENTE. TU DESEMPEÑO ES ÓPTIMO.
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'http://127.0.0.1:54321';
  const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH'; 
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.addEventListener('DOMContentLoaded', async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) { window.location.href = "acceso.html"; return; }

    cargarPerfil(user.id);
    cargarCursos(user.id);
  });

  async function cargarPerfil(uid) {
    const { data } = await _supabase.from('usuario').select('nombre').eq('id_usuario', uid).single();
    if (data) {
      document.getElementById('saludo').innerText = "HOLA, " + data.nombre.toUpperCase();
    }
  }

  async function cargarCursos(uid) {
    const contenedor = document.getElementById('contenedor-materias');
    
    // Usamos el alias explícito para evitar conflictos de relaciones
    const { data: inscripciones, error } = await _supabase
      .from('inscripcion')
      .select(`
        id_curso,
        curso!fk_curso_inscrito (
          nombre_curso,
          asignatura (nombre_asignatura, img_url_asignatura)
        )
      `)
      .eq('id_usuario', uid);

    if (error || !inscripciones || inscripciones.length === 0) {
      contenedor.innerHTML = "<div style='text-align: center; padding: 60px; border: 2px dashed #eee; color: #aaa; text-transform: uppercase;'>NO TIENES ASIGNATURAS REGISTRADAS EN TU PERFIL.</div>";
      return;
    }

    contenedor.innerHTML = "";
    const grid = document.createElement('div');
    grid.className = 'materias-grid';

    inscripciones.forEach(ins => {
      const curso = ins.curso;
      const asig = curso.asignatura;
      
      const card = document.createElement('div');
      card.className = 'materia-card';
      card.onclick = () => {
        sessionStorage.setItem("cursoActual", ins.id_curso);
        sessionStorage.setItem("nombreMateria", asig.nombre_asignatura);
        window.location.href = "lecciones.html";
      };

      card.innerHTML = `
        <img src="${asig.img_url_asignatura || 'imagenes/recursos/default.png'}">
        <div style="text-align: left;">
          <div style="font-weight: bold; font-size: 1.1em; color: #1a1a1a; letter-spacing: 0.5px;">${asig.nombre_asignatura.toUpperCase()}</div>
          <div style="font-size: 0.8em; color: #888; margin-top: 6px; text-transform: uppercase;">ID CURSO: ${ins.id_curso}</div>
        </div>
      `;
      grid.appendChild(card);
    });
    contenedor.appendChild(grid);
  }

  async function mostrarPromptInscripcion() {
    const cod = prompt("INTRODUCE EL CÓDIGO NUMÉRICO DEL CURSO:");
    if (!cod) return;
    const idCurso = parseInt(cod.trim());
    if (isNaN(idCurso)) return alert("ERROR: EL CÓDIGO DEBE SER UN VALOR NUMÉRICO.");

    const { data: { user } } = await _supabase.auth.getUser();
    const { error } = await _supabase.from('inscripcion').insert({ id_usuario: user.id, id_curso: idCurso });

    if (error) alert("ERROR DE INSCRIPCIÓN: EL CÓDIGO ES INVÁLIDO O YA ESTÁS INSCRITO.");
    else location.reload();
  }

  async function cerrarSesion() {
    await _supabase.auth.signOut();
    sessionStorage.clear();
    window.location.href = "index.html";
  }
</script>
</body>
</html>
