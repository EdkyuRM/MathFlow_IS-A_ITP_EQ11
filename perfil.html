<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Estilos específicos para el perfil que puedes pasar a styles.css después */
    .perfil-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      text-align: left;
    }
    .avatar {
      width: 80px;
      height: 80px;
      background: #7CFC00;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      color: white;
    }
    .info-usuario p {
      margin: 5px 0;
      color: #555;
    }
    .tag-rol {
      display: inline-block;
      padding: 4px 10px;
      background: #333;
      color: #7CFC00;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .panel-docente {
      background: #e9ecef;
      border-left: 5px solid #333;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none; /* Se oculta por defecto */
    }
  </style>
</head>
<body>

<div class="container extra-grande">
  <div style="text-align: left; margin-bottom: 15px;">
    <button id="btn-volver" style="width: auto; padding: 8px 15px; background: #ccc; color: #333;">← Volver al Inicio</button>
  </div>

  <div class="perfil-header">
    <div class="avatar" id="avatar-letra">?</div>
    <div class="info-usuario">
      <h1 id="nombre-usuario" style="margin: 0;">Cargando...</h1>
      <p id="correo-usuario">correo@ejemplo.com</p>
      <span class="tag-rol" id="rol-usuario">Rol</span>
    </div>
  </div>

  <div class="subtitle" style="text-align: left;">Opciones de Cuenta</div>
  <button class="btn-accion" style="background: #ddd; color: #333; margin-bottom: 10px;">Cambiar Contraseña</button>
  <button class="btn-accion" onclick="cerrarSesion()" style="background: #ff4d4d; color: white;">Cerrar Sesión</button>

  <div id="zona-docente" class="panel-docente">
    <h3 style="margin-top: 0; color: #333;">Panel de Control Docente</h3>
    <p style="font-size: 14px; color: #555;">Desde aquí puedes gestionar tus materias y ver el progreso de tus alumnos.</p>
    <button class="btn-accion" onclick="window.location.href='dashboard_docente.html'">Mis Cursos y Evaluaciones</button>
    <button class="btn-accion" onclick="window.location.href='metricas_alumno.html'" style="background: #333; color: #7CFC00;">Ver Métricas de Alumnos</button>
  </div>

</div>

<script>
  const SUPABASE_URL = 'http://127.0.0.1:54321';
  const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.addEventListener('DOMContentLoaded', cargarPerfil);

  async function cargarPerfil() {
    const { data: authData, error: authError } = await _supabase.auth.getUser();
    
    if (authError || !authData.user) {
      window.location.href = "index.html";
      return;
    }

    const uidUsuario = authData.user.id;

    // Consultamos los datos públicos del usuario
    const { data: perfilData, error: perfilError } = await _supabase
      .from('usuario')
      .select('nombre, correo, tipo_usuario')
      .eq('id_usuario', uidUsuario)
      .single();

    if (perfilData) {
      // Llenamos la interfaz
      document.getElementById('nombre-usuario').innerText = perfilData.nombre;
      document.getElementById('correo-usuario').innerText = perfilData.correo;
      document.getElementById('rol-usuario').innerText = perfilData.tipo_usuario;
      document.getElementById('avatar-letra').innerText = perfilData.nombre.charAt(0).toUpperCase();

      // Configurar el botón de "Volver" según el rol
      const btnVolver = document.getElementById('btn-volver');
      
      // LA MAGIA DE LA REUTILIZACIÓN:
      if (perfilData.tipo_usuario === 'Docente') {
        document.getElementById('zona-docente').style.display = 'block';
        // Si es docente, su inicio debería ser su dashboard, no la vista de materias de alumnos
        btnVolver.onclick = () => window.location.href = 'dashboard_docente.html';
      } else {
        // Si es Estudiante, vuelve a la bienvenida normal
        btnVolver.onclick = () => window.location.href = 'bienvenida.html';
      }
    }
  }

  async function cerrarSesion() {
    await _supabase.auth.signOut();
    sessionStorage.clear(); // Limpiamos la memoria temporal
    window.location.href = "index.html";
  }
</script>

</body>
</html>
