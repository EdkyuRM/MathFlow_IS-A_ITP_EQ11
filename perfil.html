<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil de Usuario - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0; padding: 0;
      background-image: url('imagenes/recursos/fondo_general.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .profile-card {
      width: 500px; background: rgba(255, 255, 255, 0.99);
      padding: 60px; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.3);
      text-align: center; border-top: 6px solid #7CFC00;
    }
    .avatar-circle {
      width: 120px; height: 120px; background: #1a1a1a;
      color: #7CFC00; border-radius: 50%; display: flex;
      justify-content: center; align-items: center;
      font-size: 3em; font-weight: bold; margin: 0 auto 30px auto;
      border: 4px solid #7CFC00;
    }
    .info-label {
      font-size: 0.75em; color: #888; font-weight: bold;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 20px;
    }
    .info-value {
      font-size: 1.2em; color: #1a1a1a; font-weight: bold;
      margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;
    }
  </style>
</head>
<body>

<div class="profile-card">
  <div id="avatar-letra" class="avatar-circle">U</div>
  <h2 id="nombre-usuario" style="text-transform: uppercase; margin-bottom: 40px;">CARGANDO...</h2>

  <div style="text-align: left;">
    <div class="info-label">Correo Electrónico</div>
    <div id="correo-usuario" class="info-value">...</div>

    <div class="info-label">Rol en la Plataforma</div>
    <div id="rol-usuario" class="info-value" style="color: #7CFC00;">...</div>
  </div>

  <button class="btn-hero" onclick="window.history.back()" style="width: 100%; margin-top: 40px;">VOLVER AL PANEL</button>
</div>

<script>
  const SUPABASE_URL = 'http://127.0.0.1:54321';
  const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.addEventListener('DOMContentLoaded', async () => {
    const { data: { user } } = await _supabase.auth.getUser();
    const { data } = await _supabase.from('usuario').select('*').eq('id_usuario', user.id).single();

    if (data) {
      document.getElementById('nombre-usuario').innerText = data.nombre.toUpperCase();
      document.getElementById('correo-usuario').innerText = data.correo;
      document.getElementById('rol-usuario').innerText = data.tipo_usuario.toUpperCase();
      document.getElementById('avatar-letra').innerText = data.nombre.charAt(0).toUpperCase();
    }
  });
</script>
</body>
</html>
