<!DOCTYPE html>
<html lang="es">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<head>
  <meta charset="UTF-8">
  <title>Login / Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1 id="title">Crear cuenta nueva</h1>
  <div class="subtitle">Mathflow: Plataforma Adaptativa con IA</div>

  <img src="imagenes/logo.jpeg" alt="logo">

  <input type="text" id="usuario" placeholder="Usuario">
  <input type="email" id="correo" placeholder="Correo Electrónico">
  <input type="password" id="password" placeholder="Contraseña">
 

  <select id="rol">
    <option value="">Seleccionar rol</option>
    <option value="Estudiante">Estudiante</option>
    <option value="Docente">Docente</option>
  </select>

  <button onclick="accionUsuario()" id="btn">Sign up</button>

  <div class="toggle" onclick="cambiarModo()" id="toggleText">
    ¿Ya tienes cuenta? Inicia sesión
  </div>
</div>

<script src="script_login_signin.js"></script>
</body>
</html>
