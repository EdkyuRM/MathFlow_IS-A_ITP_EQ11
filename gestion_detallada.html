<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión Administrativa - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0; padding: 0;
      background-image: url('imagenes/recursos/fondo_general.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .admin-wrapper {
      width: 96%; max-width: 1500px;
      background: rgba(255, 255, 255, 0.99);
      min-height: 100vh; padding: 60px;
      box-sizing: border-box; box-shadow: 0 0 60px rgba(0,0,0,0.4);
    }
    .header-flex {
      display: flex; justify-content: space-between; align-items: flex-end;
      border-bottom: 2px solid #eee; padding-bottom: 40px; margin-bottom: 50px;
    }
    .code-display {
      background: #1a1a1a; color: #7CFC00;
      padding: 25px 50px; border-radius: 4px; text-align: center;
    }
    .data-grid {
      display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 50px;
    }
    .panel-card {
      background: #fff; border: 1px solid #ddd; border-radius: 4px;
      padding: 40px; min-height: 500px;
    }
    th {
      text-align: left; padding: 20px; background: #f9f9f9;
      color: #666; font-size: 0.8em; text-transform: uppercase;
      border-bottom: 2px solid #7CFC00;
    }
    td { padding: 20px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

<div class="admin-wrapper">
  <div class="header-flex">
    <div style="text-align: left;">
      <button onclick="window.location.href='dashboard_docente.html'" style="background: #eee; border: none; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; font-weight: bold;">← VOLVER</button>
      <h1 id="nombre-curso" style="font-size: 3.2em; margin: 0; color: #1a1a1a; text-transform: uppercase;">LECTURA DE CURSO...</h1>
      <p id="desc-curso" style="color: #555; font-size: 1.2em; margin-top: 10px;"></p>
    </div>
    <div class="code-display">
      <div style="font-size: 0.7em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; letter-spacing: 2px;">ID DE INSCRIPCIÓN</div>
      <div id="codigo-invitacion" style="font-size: 2.5em; font-weight: bold; letter-spacing: 4px;">...</div>
    </div>
  </div>

  <div class="data-grid">
    <div class="panel-card">
      <h2 style="margin-top: 0; text-transform: uppercase; font-size: 1.2em; letter-spacing: 1px; color: #333;">Control de Alumnos</h2>
      <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
          <tr>
            <th>Nombre del Alumno</th>
            <th>Puntaje Promedio</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="lista-alumnos"></tbody>
      </table>
      <div id="vacio-alumnos" style="display:none; padding: 50px; text-align: center; color: #aaa;">
        No existen registros de alumnos inscritos para este periodo académico.
      </div>
    </div>

    <div class="panel-card" style="background: #fbfbfb;">
      <h2 style="margin-top: 0; text-transform: uppercase; font-size: 1.2em; letter-spacing: 1px; color: #333;">Gestión de Lecciones</h2>
      <div id="lista-lecciones-docente" style="margin: 30px 0;"></div>
      <button onclick="window.location.href='crear_leccion.html'" style="width: 100%; padding: 25px; background: #1a1a1a; color: #7CFC00; border: none; font-weight: bold; cursor: pointer; font-size: 1em; letter-spacing: 1px;">
        NUEVA LECCIÓN O EVALUACIÓN
      </button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'http://127.0.0.1:54321';
  const SUPABASE_ANON_KEY = 'sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH'; 
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.addEventListener('DOMContentLoaded', async () => {
    const idCurso = sessionStorage.getItem("cursoGestion");
    if (!idCurso) { window.location.href = "dashboard_docente.html"; return; }
    
    cargarInfoCurso(idCurso);
    cargarAlumnos(idCurso);
    cargarLecciones(idCurso);
  });

  async function cargarInfoCurso(id) {
    const { data } = await _supabase.from('curso').select('*').eq('id_curso', id).single();
    if (data) {
      document.getElementById('nombre-curso').innerText = data.nombre_curso.toUpperCase();
      document.getElementById('desc-curso').innerText = data.descripcion;
      document.getElementById('codigo-invitacion').innerText = id;
    }
  }

  async function cargarAlumnos(id) {
    const tbody = document.getElementById('lista-alumnos');
    const msgVacio = document.getElementById('vacio-alumnos');

    // PASO 1: Obtener solo las inscripciones y el nombre del alumno (Sin pedir el progreso aquí)
    const { data: inscripciones, error } = await _supabase
      .from('inscripcion')
      .select(`
        id_usuario,
        usuario!fk_alumno (nombre)
      `)
      .eq('id_curso', id);

    if (error || !inscripciones || inscripciones.length === 0) {
      msgVacio.style.display = "block"; 
      tbody.innerHTML = ""; 
      return;
    }

    msgVacio.style.display = "none"; 
    tbody.innerHTML = "";
    
    // PASO 2: Obtener las lecciones de este curso (para saber qué calificaciones buscar)
    const { data: lecciones } = await _supabase
      .from('leccion')
      .select('id_leccion')
      .eq('id_curso', id);
    
    const idsLecciones = lecciones ? lecciones.map(l => l.id_leccion) : [];

    // PASO 3: Llenar la tabla calculando el progreso de cada alumno individualmente
    for (const item of inscripciones) {
      let ultimoPuntaje = "N/A";

      // Si el curso ya tiene lecciones, buscamos la calificación más reciente del alumno
      if (idsLecciones.length > 0) {
        const { data: progresos } = await _supabase
          .from('progreso_alumno')
          .select('puntaje_obtenido')
          .eq('id_usuario', item.id_usuario)
          .in('id_leccion', idsLecciones) // Solo evaluamos lecciones de este curso
          .order('fecha_evaluacion', { ascending: false })
          .limit(1); // Traemos solo el último examen que hizo

        if (progresos && progresos.length > 0) {
          ultimoPuntaje = progresos[0].puntaje_obtenido;
        }
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-weight: 600; color: #222;">${(item.usuario?.nombre || "SIN NOMBRE").toUpperCase()}</td>
        <td style="font-weight: bold; color: ${ultimoPuntaje === 'N/A' ? '#999' : (ultimoPuntaje < 70 ? '#e74c3c' : '#27ae60')}">${ultimoPuntaje}${ultimoPuntaje !== 'N/A' ? '%' : ''}</td>
        <td>
          <button onclick="verMetricasAlumno('${item.id_usuario}')" style="background: #1a1a1a; color: #7CFC00; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px; font-size: 0.7em; font-weight: bold;">ANALÍTICA</button>
        </td>
      `;
      tbody.appendChild(tr);
    }
  }
  async function cargarLecciones(id) {
    const contenedor = document.getElementById('lista-lecciones-docente');
    const { data } = await _supabase.from('leccion').select('tema').eq('id_curso', id);
    
    if (!data || data.length === 0) {
      contenedor.innerHTML = "<div style='padding: 30px; border: 1px dashed #ccc; text-align: center; color: #999; font-size: 0.9em;'>LISTA DE TEMAS VACÍA</div>";
      return;
    }

    contenedor.innerHTML = data.map(l => `
      <div style="padding: 20px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 10px; font-weight: bold; color: #1a1a1a; letter-spacing: 0.5px;">
        ${l.tema.toUpperCase()}
      </div>
    `).join('');
  }

  function verMetricasAlumno(id) {
    sessionStorage.setItem("alumnoAMonitorear", id);
    window.location.href = "metricas_alumno.html";
  }
</script>
</body>
</html>
