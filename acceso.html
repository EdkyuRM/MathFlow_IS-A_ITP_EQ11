<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso - MathFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('imagenes/recursos/fondo_general.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Contenedor principal que ocupa casi todo el ancho y alto */
    .acceso-wrapper {
      width: 94%;
      max-width: 1400px;
      height: 90vh;
      background: rgba(255, 255, 255, 0.98);
      display: flex;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
      border-radius: 8px;
      overflow: hidden;
    }

    /* Lado Izquierdo: Identidad y Marca */
    .acceso-branding {
      flex: 1;
      background: #1a1a1a;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      border-right: 6px solid #7CFC00;
    }

    .acceso-branding img {
      width: 180px;
      border-radius: 20px;
      margin-bottom: 30px;
      border: 3px solid #7CFC00;
    }

    .acceso-branding h1 {
      font-size: 3em;
      margin: 0;
      color: #7CFC00;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .acceso-branding p {
      text-align: center;
      color: #888;
      max-width: 300px;
      line-height: 1.6;
      margin-top: 20px;
      text-transform: uppercase;
      font-size: 0.8em;
      letter-spacing: 1px;
    }

    /* Lado Derecho: Formulario */
    .acceso-form-container {
      flex: 1.2;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #ffffff;
    }

    .form-header {
      margin-bottom: 40px;
      border-bottom: 2px solid #eee;
      padding-bottom: 20px;
    }

    .form-header h2 {
      margin: 0;
      font-size: 2.2em;
      color: #1a1a1a;
      text-transform: uppercase;
    }

    .input-group {
      margin-bottom: 20px;
    }

    /* Estilización de Inputs para que se vean profesionales */
    input, select {
      width: 100%;
      padding: 18px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fcfcfc;
      font-size: 1em;
      box-sizing: border-box;
      transition: border 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #7CFC00;
      background: #fff;
    }

    button#btn {
      width: 100%;
      padding: 20px;
      background: #1a1a1a;
      color: #7CFC00;
      border: none;
      font-weight: bold;
      font-size: 1.1em;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button#btn:hover {
      background: #333;
      transform: translateY(-2px);
    }

    .toggle-text {
      margin-top: 25px;
      text-align: center;
      color: #666;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .toggle-text:hover {
      color: #1a1a1a;
      font-weight: bold;
    }

    /* Ajuste para que los campos opcionales no dejen huecos */
    #usuario, #rol {
      display: block;
    }
  </style>
</head>
<body>

<div class="acceso-wrapper">
  <div class="acceso-branding">
    <img src="imagenes/recursos/logo.jpeg" alt="MathFlow Logo">
    <h1>MathFlow</h1>
    <p>Ingeniería y educación adaptativa impulsada por inteligencia artificial</p>
  </div>

  <div class="acceso-form-container">
    <div class="form-header">
      <h2 id="title">CREAR CUENTA NUEVA</h2>
      <div style="color: #999; font-size: 0.8em; letter-spacing: 1px; margin-top: 5px;">SISTEMA DE GESTIÓN ACADÉMICA</div>
    </div>

    <div class="input-group">
      <input type="text" id="usuario" placeholder="NOMBRE COMPLETO">
      <input type="email" id="correo" placeholder="CORREO ELECTRÓNICO">
      <input type="password" id="password" placeholder="CONTRASEÑA">
      
      <select id="rol">
        <option value="">SELECCIONAR ROL ACADÉMICO</option>
        <option value="Estudiante">ESTUDIANTE</option>
        <option value="Docente">DOCENTE</option>
      </select>
    </div>

    <button onclick="accionUsuario()" id="btn">SIGN UP</button>

    <div class="toggle-text" onclick="cambiarModo()" id="toggleText">
      ¿YA TIENES CUENTA? INICIA SESIÓN
    </div>
  </div>
</div>

<script src="script_login_signin.js"></script>
</body>
</html>
