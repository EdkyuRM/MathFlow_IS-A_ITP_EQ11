<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Examen</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="examen-container">

  <!-- VERDE (título) -->
  <div class="examen-header">
    <h1 id="titulo"></h1>
  </div>

  <!-- AZUL (preguntas) -->
  <div class="examen-body">
    <p>1. Ejemplo de pregunta</p>
    <input type="text">

    <p>2. Ejemplo de pregunta</p>
    <input type="text">

</div>

<script>
  const materia = localStorage.getItem("materia");

  function enviar() {
    window.location.href = "perfil.html";
  }

  function volver() {
    window.location.href = "bienvenida.html";
  }
</script>

</body>
</html>
